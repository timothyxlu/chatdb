<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }
    .header img { width: 24px; height: 24px; border-radius: 4px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .body { padding: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #6366f1; }
    .field + .field { margin-top: 12px; }
    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 9px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4f46e5; }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .status.ok { color: #16a34a; }
    .status.err { color: #dc2626; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="ChatDB">
    <h1>ChatDB</h1>
  </div>
  <div class="body">
    <div class="field">
      <label for="url">Backend URL</label>
      <input id="url" type="url" placeholder="https://your-chatdb.example.com">
      <div class="hint">Your ChatDB instance URL</div>
    </div>
    <div class="field">
      <label for="token">API Token</label>
      <input id="token" type="password" placeholder="chatdb_tk_...">
      <div class="hint">Settings &rarr; API Tokens in ChatDB</div>
    </div>
    <button id="save">Save</button>
    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
